<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIM Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #ffffff;
    --bg-subtle:     #f9fafb;
    --bg-elevated:   #f3f4f6;
    --bg-hover:      #e5e7eb;
    --border:        #e5e7eb;
    --border-light:  #f0f0f0;
    --text:          #111827;
    --text-secondary:#6b7280;
    --text-muted:    #9ca3af;
    --accent:        #6E56CF;
    --accent-subtle: #f5f3ff;
    --accent-border: #ddd6fe;
    --green:         #059669;
    --green-subtle:  #ecfdf5;
    --amber:         #d97706;
    --amber-subtle:  #fffbeb;
    --red:           #dc2626;
    --red-subtle:    #fef2f2;
    --radius:        12px;
    --radius-sm:     8px;
    --radius-full:   9999px;
    --font:          'Inter', -apple-system, system-ui, sans-serif;
    --chat-w:        720px;
    --header-h:      56px;
    --shadow:        0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg:     0 4px 16px rgba(0,0,0,.1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:            #0f0f0f;
      --bg-subtle:     #1a1a1a;
      --bg-elevated:   #222;
      --bg-hover:      #2a2a2a;
      --border:        #2a2a2a;
      --border-light:  #1f1f1f;
      --text:          #e5e5e5;
      --text-secondary:#888;
      --text-muted:    #666;
      --accent-subtle: #1a1430;
      --accent-border: #2a2050;
      --green-subtle:  #0a1f14;
      --amber-subtle:  #1f1508;
      --red-subtle:    #1f0a0a;
      --shadow:        0 1px 3px rgba(0,0,0,.3);
      --shadow-lg:     0 4px 16px rgba(0,0,0,.4);
    }
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* ─── Layout ─── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ─── Header ─── */
  .header {
    height: var(--header-h); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative; z-index: 10;
  }
  .header-left  { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .header-brand { display: flex; align-items: center; gap: 8px; }
  .logo {
    width: 28px; height: 28px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent) 0%, #9C7EF0 100%);
    border-radius: 7px;
    display: grid; place-items: center;
  }
  .logo svg { width: 14px; height: 14px; fill: #fff; stroke: none; }
  .brand-text { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
  .brand-badge {
    font-size: 10px; font-weight: 500; padding: 2px 7px;
    background: var(--accent-subtle); color: var(--accent);
    border-radius: var(--radius-full);
    font-family: var(--font);
  }

  .header-file {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-secondary);
    border-left: 1px solid var(--border); padding-left: 12px; margin-left: 4px;
    min-width: 0;
  }
  .header-file svg { width: 14px; height: 14px; fill: none; stroke: currentColor; flex-shrink: 0; }
  .header-filename { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

  .btn {
    padding: 6px 12px; border-radius: var(--radius-sm);
    background: none; border: 1px solid var(--border);
    color: var(--text-secondary); font-family: var(--font); font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: background .12s, color .12s, border-color .12s;
  }
  .btn:hover { background: var(--bg-elevated); color: var(--text); border-color: var(--bg-hover); }
  .btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; }
  .btn-primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .btn-primary:hover { background: #5a46b8; border-color: #5a46b8; color: #fff; }

  .btn-icon {
    width: 32px; height: 32px; padding: 0;
    display: grid; place-items: center;
    border-radius: 6px;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; vertical-align: middle;
  }
  .dot-idle { background: var(--text-muted); }
  .dot-running { background: var(--amber); animation: pulse 1s ease-in-out infinite; }
  .dot-ready { background: var(--green); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ─── Chat ─── */
  .chat { flex: 1; overflow-y: auto; min-height: 0; }
  .chat-inner {
    max-width: var(--chat-w); margin: 0 auto;
    padding: 0 20px 20px;
    display: flex; flex-direction: column;
  }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 60px 20px;
    text-align: center;
    min-height: 400px;
  }
  .empty-icon {
    width: 64px; height: 64px; border-radius: 18px;
    background: var(--accent-subtle); border: 1px solid var(--accent-border);
    display: grid; place-items: center;
  }
  .empty-icon svg { width: 28px; height: 28px; fill: none; stroke: var(--accent); stroke-width: 1.5; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); }
  .empty-sub   { font-size: 14px; color: var(--text-secondary); max-width: 360px; line-height: 1.5; }

  /* Upload zone in empty state */
  .upload-area {
    width: 100%; max-width: 400px;
    margin-top: 8px;
    padding: 40px 24px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    cursor: pointer; position: relative;
    transition: border-color .2s, background .2s;
  }
  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--accent);
    background: var(--accent-subtle);
  }
  .upload-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .upload-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .upload-hint  { font-size: 12px; color: var(--text-muted); font-family: var(--font); }
  .upload-progress {
    width: 100%; max-width: 400px; margin-top: 12px;
    display: none; flex-direction: column; gap: 4px;
  }
  .upload-progress.visible { display: flex; }
  .progress-track { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
  .progress-fill  { height: 100%; width: 0%; transition: width .3s ease; border-radius: 2px; }
  .progress-fill.ok { background: var(--accent); }
  .progress-fill.err { background: var(--red); }
  .progress-status { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Messages */
  .msg { padding: 16px 0 0; max-width: var(--chat-w); }
  .msg-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
    padding: 0 2px;
  }
  .msg-avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: grid; place-items: center;
    font-size: 10px; font-weight: 600;
  }
  .msg-avatar.ai {
    background: var(--accent); color: #fff;
  }
  .msg-avatar.you {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .msg-author { font-size: 13px; font-weight: 600; }
  .msg-time   { font-size: 11px; color: var(--text-muted); }

  .msg-content {
    font-size: 14px; line-height: 1.7;
    padding: 0 2px;
    color: var(--text);
  }

  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content strong { font-weight: 600; }
  .msg-content code {
    font-family: 'SF Mono', 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--bg-elevated); padding: 1px 5px; border-radius: 4px;
    color: var(--accent);
  }
  .msg-content pre {
    background: var(--bg-subtle); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px; margin: 8px 0;
    overflow-x: auto; font-size: 12px; line-height: 1.5;
  }
  .msg-content pre code { background: none; padding: 0; color: inherit; }
  .msg-content ul, .msg-content ol { padding-left: 20px; margin: 4px 0; }
  .msg-content li { margin-bottom: 2px; }

  /* Inline tool indicator */
  .tool-line {
    display: inline-flex; align-items: center; gap: 6px;
    margin: 4px 0;
    font-size: 12px; color: var(--text-secondary);
    font-family: 'SF Mono', monospace;
  }
  .tool-line svg { width: 12px; height: 12px; fill: none; stroke: currentColor; flex-shrink: 0; }

  /* Streaming cursor */
  .streaming-cursor::after { content: '▋'; animation: blink .9s step-end infinite; color: var(--accent); margin-left: 1px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Thinking indicator */
  .thinking {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0; color: var(--text-muted); font-size: 13px;
  }
  .thinking-dots { display: flex; gap: 4px; }
  .thinking-dots span {
    width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted);
    animation: thinker 1.2s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .thinking-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes thinker { 0%,100%{opacity:.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }

  /* File cards in messages */
  .file-cards { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .file-card {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: var(--radius-sm);
    background: var(--bg-elevated); border: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    font-size: 13px; transition: background .12s, border-color .12s;
  }
  .file-card:hover { background: var(--bg-hover); }
  .file-card svg { width: 14px; height: 14px; fill: none; stroke: var(--accent); flex-shrink: 0; }
  .file-card-name { font-family: 'SF Mono', monospace; font-size: 11px; }
  .file-card-dl   { font-size: 11px; color: var(--text-muted); }

  /* Error bubble */
  .msg.error .msg-avatar.ai { background: var(--red); }
  .msg.error .msg-author { color: var(--red); }

  /* ─── Input ─── */
  .input-area {
    flex-shrink: 0;
    padding: 0 20px 16px;
    background: var(--bg);
    border-top: 1px solid var(--border-light);
  }
  .input-inner {
    max-width: var(--chat-w); margin: 0 auto;
    display: flex; flex-direction: column; gap: 8px;
  }

  .input-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0;
    transition: border-color .15s, box-shadow .15s;
    display: flex; align-items: flex-end;
    box-shadow: var(--shadow);
  }
  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(110,86,207,.12), var(--shadow);
  }

  .input-textarea {
    flex: 1;
    background: none; border: none; outline: none; resize: none;
    color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5;
    padding: 14px 0 14px 16px;
    min-height: 52px; max-height: 200px;
    scrollbar-width: thin;
  }
  .input-textarea::placeholder { color: var(--text-muted); }

  .input-actions-col {
    display: flex; align-items: center;
    padding: 8px 8px 8px 0;
    gap: 4px;
  }

  .attach-btn {
    width: 32px; height: 32px; border-radius: 8px;
    background: none; border: none; cursor: pointer;
    display: grid; place-items: center;
    color: var(--text-muted);
    transition: background .12s, color .12s;
  }
  .attach-btn:hover { background: var(--bg-elevated); color: var(--text-secondary); }
  .attach-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.5; }
  .attach-btn input { position: absolute; opacity: 0; width: 0; height: 0; }

  .send-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent); border: none; cursor: pointer;
    display: grid; place-items: center;
    transition: background .15s, transform .1s, opacity .15s;
    flex-shrink: 0;
  }
  .send-btn:hover   { background: #5a46b8; }
  .send-btn:active  { transform: scale(.92); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; background: var(--accent); }
  .send-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.5; }

  .input-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px;
  }
  .input-footer-left {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
  }
  .input-footer-left svg { width: 12px; height: 12px; fill: none; stroke: currentColor; }
  .pii-badge {
    padding: 2px 8px; border-radius: var(--radius-full);
    background: var(--bg-elevated); color: var(--text-muted);
    font-size: 11px;
  }

  /* Quick actions */
  .quick-actions {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .quick-btn {
    padding: 5px 12px; border-radius: var(--radius-full);
    background: var(--bg-subtle); border: 1px solid var(--border);
    font-family: var(--font); font-size: 12px; color: var(--text-secondary);
    cursor: pointer; transition: background .12s, color .12s, border-color .12s;
  }
  .quick-btn:hover {
    background: var(--bg-elevated); color: var(--text);
    border-color: var(--bg-hover);
  }

  /* ─── Sessions drawer ─── */
  .sessions-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,.3); backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .sessions-overlay.open { opacity: 1; pointer-events: all; }

  .sessions-drawer {
    position: fixed; top: 0; left: 0; bottom: 0; width: 280px; z-index: 51;
    background: var(--bg); border-right: 1px solid var(--border);
    transform: translateX(-100%); transition: transform .25s ease;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);
  }
  .sessions-drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-title { font-size: 14px; font-weight: 600; }
  .drawer-close {
    width: 28px; height: 28px; border-radius: 6px;
    background: none; border: none; cursor: pointer;
    display: grid; place-items: center;
    color: var(--text-muted); transition: background .12s;
  }
  .drawer-close:hover { background: var(--bg-elevated); color: var(--text); }
  .drawer-close svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

  .drawer-list { flex: 1; overflow-y: auto; padding: 8px; }
  .drawer-list::-webkit-scrollbar { width: 4px; }
  .drawer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .drawer-item {
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .12s;
    display: flex; flex-direction: column; gap: 2px;
  }
  .drawer-item:hover { background: var(--bg-subtle); }
  .drawer-item.active { background: var(--accent-subtle); }
  .drawer-item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .drawer-item-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; }
  .drawer-item-badge {
    font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 3px;
    background: var(--bg-elevated); color: var(--text-muted);
    align-self: flex-start;
  }

  .drawer-footer {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .drawer-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: grid; place-items: center; font-size: 12px; font-weight: 600;
    flex-shrink: 0;
  }
  .drawer-user-info { flex: 1; min-width: 0; }
  .drawer-user-name { font-size: 13px; font-weight: 500; }
  .drawer-user-plan { font-size: 11px; color: var(--text-muted); }

  /* ─── Responsive ─── */
  @media (max-width: 640px) {
    .header { padding: 0 12px; }
    .chat-inner { padding: 0 12px 12px; }
    .input-area { padding: 0 12px 12px; }
    .brand-badge { display: none; }
    .header-file { display: none; }
    .btn span { display: none; }
    .empty-state { padding: 40px 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0s !important; transition-duration: 0s !important; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">

  <!-- ─── Header ─── -->
  <header class="header">
    <div class="header-left">
      <button class="btn btn-icon" id="menuBtn" title="Sessions" aria-label="Open sessions">
        <svg viewBox="0 0 24 24" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-brand">
        <div class="logo">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10M4 18h6" stroke="white" stroke-width="1.5"/></svg>
        </div>
        <span class="brand-text">PIM Agent</span>
        <span class="brand-badge">Ingestion</span>
      </div>
      <div class="header-file" id="headerFile" style="display:none">
        <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="header-filename" id="headerFilename">—</span>
        <span class="status-dot dot-idle" id="statusDot"></span>
      </div>
    </div>
    <div class="header-right">
      <button class="btn" id="newBtn" title="New session">
        <svg viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>New</span>
      </button>
    </div>
  </header>

  <!-- ─── Chat ─── -->
  <div class="chat" id="chat">
    <div class="chat-inner" id="chatInner">

      <!-- Empty state / upload -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="empty-title">Upload a product file to start</div>
        <div class="empty-sub">Drop your spreadsheet or click to browse. Supports .xlsx, .xls, .csv</div>

        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:var(--accent);stroke-width:1.5"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div class="upload-label">Choose a file or drag it here</div>
          <div class="upload-hint">.xlsx · .xls · .csv — up to 100MB</div>
        </div>

        <div class="upload-progress" id="uploadProgress">
          <div class="progress-track"><div class="progress-fill ok" id="progressFill"></div></div>
          <div class="progress-status" id="progressStatus">Uploading…</div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages"></div>

    </div>
  </div>

  <!-- ─── Input ─── -->
  <div class="input-area hidden" id="inputArea">
    <div class="input-inner">
      <div class="quick-actions" id="quickActions">
        <button class="quick-btn" data-prompt="List all columns and their detected data types">📋 List columns</button>
        <button class="quick-btn" data-prompt="Find categories using CATEGORY1, CATEGORY2, CATEGORY3, CATEGORY4">🏷️ Find categories</button>
        <button class="quick-btn" data-prompt="Map all attributes to PIM fields">🔗 Map attributes</button>
        <button class="quick-btn" data-prompt="Generate the final PIM templates">📦 Generate output</button>
      </div>

      <div class="input-box">
        <textarea class="input-textarea" id="msgInput" placeholder="Ask the agent…" rows="1"></textarea>
        <div class="input-actions-col">
          <button class="attach-btn" id="attachBtn" title="Attach file">
            <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            <input type="file" id="attachInput" accept=".xlsx,.xls,.csv" />
          </button>
          <button class="send-btn" id="sendBtn" disabled>
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>

      <div class="input-footer">
        <div class="input-footer-left">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>May produce errors. Verify before import.</span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ─── Sessions Drawer ─── -->
<div class="sessions-overlay" id="sessionsOverlay"></div>
<div class="sessions-drawer" id="sessionsDrawer">
  <div class="drawer-header">
    <div class="drawer-title">Sessions</div>
    <button class="drawer-close" id="drawerClose">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-list" id="drawerList"></div>
  <div class="drawer-footer">
    <div class="drawer-avatar">U</div>
    <div class="drawer-user-info">
      <div class="drawer-user-name">User</div>
      <div class="drawer-user-plan">PIM Agent</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
const state = {
  threadId: null,
  filePath: null,
  filename: null,
  isStreaming: false,
  turnCount: 0,
  toolCallCount: 0,
  sessions: JSON.parse(localStorage.getItem('pim_sessions') || '[]'),
};

const BASE = window.location.origin;

// ═══════════════════════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const chatInner       = $('chatInner');
const emptyState      = $('emptyState');
const uploadArea      = $('uploadArea');
const fileInput       = $('fileInput');
const uploadProgress  = $('uploadProgress');
const progressFill    = $('progressFill');
const progressStatus  = $('progressStatus');
const messages        = $('messages');
const inputArea       = $('inputArea');
const msgInput        = $('msgInput');
const sendBtn         = $('sendBtn');
const headerFile      = $('headerFile');
const headerFilename  = $('headerFilename');
const statusDot       = $('statusDot');
const quickActions    = $('quickActions');

// ═══════════════════════════════════════════════════════════
//  Sessions Drawer
// ═══════════════════════════════════════════════════════════
function renderDrawer() {
  const list = $('drawerList');
  list.innerHTML = '';
  if (!state.sessions.length) {
    list.innerHTML = '<div style="padding:14px;font-size:13px;color:var(--text-muted)">No sessions yet</div>';
    return;
  }
  [...state.sessions].reverse().forEach(s => {
    const el = document.createElement('div');
    el.className = 'drawer-item' + (s.threadId === state.threadId ? ' active' : '');
    el.innerHTML = `
      <div class="drawer-item-name">${escHtml(s.filename || 'Unknown')}</div>
      <div class="drawer-item-meta">
        <span>${new Date(s.ts).toLocaleDateString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
        <span class="drawer-item-badge">${s.status}</span>
      </div>`;
    el.addEventListener('click', () => { closeDrawer(); restoreSession(s); });
    list.appendChild(el);
  });
}

function saveSession(status='active') {
  const idx = state.sessions.findIndex(s => s.threadId === state.threadId);
  const rec = { threadId: state.threadId, filePath: state.filePath, filename: state.filename, ts: Date.now(), status };
  if (idx >= 0) state.sessions[idx] = rec; else state.sessions.push(rec);
  localStorage.setItem('pim_sessions', JSON.stringify(state.sessions));
  renderDrawer();
}

function restoreSession(s) {
  state.threadId = s.threadId;
  state.filePath  = s.filePath;
  state.filename  = s.filename;
  headerFilename.textContent = s.filename || '—';
  headerFile.style.display = 'flex';
  emptyState.classList.add('hidden');
  messages.classList.remove('hidden');
  inputArea.classList.remove('hidden');
  setStatus('ready');
  renderDrawer();
  // Show a restore notice
  addSystemNote(`Resumed session: ${escHtml(s.filename)}`);
  // In a real app: fetch history via /interactive/status and render past messages
}

function openDrawer() {
  $('sessionsOverlay').classList.add('open');
  $('sessionsDrawer').classList.add('open');
}
function closeDrawer() {
  $('sessionsOverlay').classList.remove('open');
  $('sessionsDrawer').classList.remove('open');
}
$('menuBtn').addEventListener('click', openDrawer);
$('sessionsOverlay').addEventListener('click', closeDrawer);
$('drawerClose').addEventListener('click', closeDrawer);

$('newBtn').addEventListener('click', resetSession);

function resetSession() {
  state.threadId = null;
  state.filePath  = null;
  state.filename  = null;
  messages.innerHTML = '';
  emptyState.classList.remove('hidden');
  messages.classList.add('hidden');
  inputArea.classList.add('hidden');
  headerFile.style.display = 'none';
  state.turnCount = 0;
  state.toolCallCount = 0;
  setStatus('idle');
  closeDrawer();
  renderDrawer();
}

// ═══════════════════════════════════════════════════════════
//  Upload
// ═══════════════════════════════════════════════════════════
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleUpload(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleUpload(fileInput.files[0]); });

async function handleUpload(file) {
  uploadProgress.classList.add('visible');
  progressFill.style.width = '0%';
  progressFill.className = 'progress-fill ok';
  progressStatus.textContent = `Uploading ${file.name}…`;

  let pct = 0;
  const ticker = setInterval(() => {
    pct = Math.min(pct + Math.random() * 10, 85);
    progressFill.style.width = pct + '%';
  }, 100);

  const fd = new FormData();
  fd.append('file', file);

  try {
    const res = await fetch(`${BASE}/upload`, { method: 'POST', body: fd });
    const data = await res.json();
    clearInterval(ticker);
    progressFill.style.width = '100%';
    progressStatus.textContent = 'Processing…';
    state.filePath = data.path;
    state.filename = data.filename;
    setTimeout(startSession, 400);
  } catch(e) {
    clearInterval(ticker);
    progressFill.className = 'progress-fill err';
    progressStatus.textContent = 'Upload failed: ' + e.message;
  }
}

async function startSession() {
  headerFilename.textContent = state.filename;
  headerFile.style.display = 'flex';
  emptyState.classList.add('hidden');
  messages.classList.remove('hidden');
  inputArea.classList.remove('hidden');
  setStatus('running');
  msgInput.focus();

  const tid = showThinking();

  try {
    const res = await fetch(`${BASE}/interactive/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_path: state.filePath }),
    });
    hideThinking(tid);
    await consumeSSE(res, true);
  } catch(e) {
    hideThinking(tid);
    showError('Failed to start: ' + e.message);
    setStatus('idle');
  }
}

// ═══════════════════════════════════════════════════════════
//  SSE
// ═══════════════════════════════════════════════════════════
async function consumeSSE(response, isStart) {
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  let bubble = null;

  state.isStreaming = true;
  sendBtn.disabled = true;
  setStatus('running');

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        let evt;
        try { evt = JSON.parse(raw); } catch { continue; }

        switch (evt.type) {
          case 'tool_start':
            state.toolCallCount++;
            if (!bubble) bubble = createBubble();
            addToolLine(bubble, evt.tool, 'running', evt.input);
            setStatus('running');
            break;

          case 'tool_end':
            if (!bubble) bubble = createBubble();
            addToolLine(bubble, evt.tool, 'done', evt.output_preview);
            break;

          case 'progress':
            if (!bubble) bubble = createBubble();
            appendText(bubble, evt.message, true);
            break;

          case 'complete':
            if (isStart) state.threadId = evt.thread_id;
            if (!bubble) bubble = createBubble();
            finalizeBubble(bubble, evt.generated_files, evt.message);
            state.turnCount++;
            setStatus('ready');
            saveSession('active');
            msgInput.disabled = false;
            break;
        }
      }
    }
  } catch (e) {
    // SSE stream error — show it in the UI
    showError('Stream error: ' + (e.message || e));
    setStatus('idle');
  } finally {
    state.isStreaming = false;
    sendBtn.disabled = false;
    if (msgInput) { msgInput.focus(); checkInput(); }
  }
}

// ═══════════════════════════════════════════════════════════
//  Send
// ═══════════════════════════════════════════════════════════
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || state.isStreaming || !state.threadId) return;

  addUserMsg(text);
  msgInput.value = '';
  msgInput.style.height = '';
  sendBtn.disabled = true;

  const tid = showThinking();

  try {
    const res = await fetch(`${BASE}/interactive/respond`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thread_id: state.threadId, message: text }),
    });
    hideThinking(tid);
    await consumeSSE(res, false);
  } catch(e) {
    hideThinking(tid);
    showError('Connection error: ' + e.message);
    setStatus('idle');
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + 'px';
  checkInput();
});
function checkInput() { sendBtn.disabled = !msgInput.value.trim() || state.isStreaming; }

// Quick actions
document.querySelectorAll('.quick-btn').forEach(el => {
  el.addEventListener('click', () => {
    msgInput.value = el.dataset.prompt;
    msgInput.dispatchEvent(new Event('input'));
    msgInput.focus();
  });
});

// Attach file in input area (re-upload shortcut)
$('attachBtn').addEventListener('click', () => $('attachInput').click());
$('attachInput').addEventListener('change', () => {
  if ($('attachInput').files[0]) {
    resetSession();
    handleUpload($('attachInput').files[0]);
  }
});

// ═══════════════════════════════════════════════════════════
//  Bubble builders
// ═══════════════════════════════════════════════════════════
function timeStr() {
  return new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function md(s) {
  return String(s)
    .replace(/<strong>/g, '')
    .replace(/<\/strong>/g, '')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function scrollBottom() {
  requestAnimationFrame(() => { $('chat').scrollTop = $('chat').scrollHeight; });
}

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-header">
      <div class="msg-avatar you">U</div>
      <span class="msg-author"></span>
      <span class="msg-time">${timeStr()}</span>
    </div>
    <div class="msg-content">${md(text)}</div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function createBubble() {
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-header">
      <div class="msg-avatar ai"></div>
      <span class="msg-author"></span>
      <span class="msg-time">${timeStr()}</span>
    </div>
    <div class="msg-content streaming-cursor"></div>`;
  messages.appendChild(div);
  scrollBottom();
  return div;
}

function appendText(bubble, token, streaming) {
  const content = bubble.querySelector('.msg-content');
  if (streaming) {
    content.classList.add('streaming-cursor');
    content.innerHTML += escHtml(token);
  } else {
    content.innerHTML = md(token);
  }
  scrollBottom();
}

function addToolLine(bubble, tool, status, detail) {
  const content = bubble.querySelector('.msg-content');
  const dot = status === 'running' ? '🔄' : status === 'done' ? '✅' : '❌';
  const line = document.createElement('div');
  line.className = 'tool-line';
  line.innerHTML = `${dot} ${tool}`;
  content.appendChild(line);
  scrollBottom();
}

function finalizeBubble(bubble, files, message) {
  const content = bubble.querySelector('.msg-content');
  content.classList.remove('streaming-cursor');
  const raw = message || content.innerText || content.textContent;
  content.innerHTML = md(raw);

  if (files && files.length) {
    const cards = document.createElement('div');
    cards.className = 'file-cards';
    files.forEach(f => {
      const fname = f.split('/').pop();
      cards.innerHTML += `
        <a href="${BASE}/${f}" download class="file-card">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="file-card-name">${escHtml(fname)}</span>
          <span class="file-card-dl">↓</span>
        </a>`;
    });
    bubble.querySelector('.msg-content').appendChild(cards);
  }
  scrollBottom();
}

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'msg error';
  div.innerHTML = `
    <div class="msg-header">
      <div class="msg-avatar ai">!</div>
      <span class="msg-author">Error</span>
      <span class="msg-time">${timeStr()}</span>
    </div>
    <div class="msg-content">${escHtml(msg)}</div>`;
  messages.appendChild(div);
  scrollBottom();
}

function addSystemNote(msg) {
  const div = document.createElement('div');
  div.style.cssText = 'padding:10px 2px;font-size:13px;color:var(--text-muted);border-bottom:1px solid var(--border-light)';
  div.textContent = msg;
  messages.appendChild(div);
  scrollBottom();
}

let thinkingId = 0;
function showThinking() {
  const id = 'think-' + (++thinkingId);
  const div = document.createElement('div');
  div.className = 'thinking'; div.id = id;
  div.innerHTML = `<div class="thinking-dots"><span></span><span></span><span></span></div><span>Thinking…</span>`;
  messages.appendChild(div);
  scrollBottom();
  return id;
}
function hideThinking(id) { document.getElementById(id)?.remove(); }

// ═══════════════════════════════════════════════════════════
//  Status
// ═══════════════════════════════════════════════════════════
function setStatus(type) {
  statusDot.className = 'status-dot';
  if (type === 'ready')   statusDot.classList.add('dot-ready');
  else if (type === 'running') statusDot.classList.add('dot-running');
  else                    statusDot.classList.add('dot-idle');
}

// ═══════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════
renderDrawer();

// Restore last session on load if exists
if (state.sessions.length > 0) {
  const last = state.sessions[state.sessions.length - 1];
  if (last.status === 'active') {
    restoreSession(last);
  }
}
</script>
</body>
</html>
